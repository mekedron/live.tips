<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Your tip jar for live performances — fans scan a code, you watch the jar fill.">
  <link rel="canonical" href="https://live.tips/app/">

  <!-- social share preview — image lives on the apex site (see website/) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="live.tips">
  <meta property="og:url" content="https://live.tips/app/">
  <meta property="og:title" content="live.tips — live tip jar app">
  <meta property="og:description" content="Your tip jar for live performances — fans scan a code, you watch the jar fill.">
  <meta property="og:image" content="https://live.tips/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://live.tips/og-image.png">

  <!-- iOS meta tags & icons -->
  <!-- Both flags let an "Add to Home Screen" shortcut launch standalone (no
       Safari chrome) — the only way to get a fullscreen stage on iPhone,
       which has no Fullscreen API. -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="live.tips">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>live.tips</title>
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#FAF6F1" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#14110E" media="(prefers-color-scheme: dark)">

  <style>
    /* Stop the browser turning a horizontal overscroll into history
       navigation — the two-finger swipe (macOS trackpad, Chromium) otherwise
       fires back/forward mid-session and tears down open modals. Flutter
       drives its own scrolling, so blocking the x-axis navigation gesture
       here has no effect on in-app scrolling. WebKit ignores this property
       for its edge-swipe gesture, so iOS Safari is handled by the script
       below instead. */
    html, body {
      overscroll-behavior-x: none;
    }

    /* Paint the brand background on the very first frame the browser renders,
       BEFORE Flutter boots — otherwise a device (especially a dark-themed one)
       flashes white while the engine loads. Colours are the app's own theme
       tokens from lib/core/theme.dart: warm-paper light (bg #FAF6F1) and the
       near-black dark (bg #14110E), with the coral accent for the wordmark. */
    :root {
      --lt-bg: #FAF6F1;
      --lt-accent: #E8542F;
      --lt-text: #221D18;
      --lt-track: #E9E1D6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --lt-bg: #14110E;
        --lt-accent: #FF7C55;
        --lt-text: #F5F0E8;
        --lt-track: #322C26;
      }
    }
    html, body { background-color: var(--lt-bg); margin: 0; }

    /* Splash overlay — inline, no external requests, so it paints instantly. */
    #lt-splash {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background-color: var(--lt-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      opacity: 1;
      transition: opacity 320ms ease;
    }
    #lt-splash.lt-hide { opacity: 0; }
    #lt-splash .lt-wordmark {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--lt-text);
    }
    #lt-splash .lt-wordmark .lt-dot { color: var(--lt-accent); }
    #lt-splash .lt-spinner {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 3px solid var(--lt-track);
      border-top-color: var(--lt-accent);
      animation: lt-spin 0.8s linear infinite;
    }
    @keyframes lt-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      #lt-splash .lt-spinner { animation: none; }
    }
  </style>

  <script>
    // iOS/iPadOS Safari — including a home-screen PWA — reads a swipe from the
    // very left or right screen edge as a back/forward history navigation, and
    // WebKit ignores `overscroll-behavior-x` for it. Because tab switches don't
    // push history entries, that swipe hits the root of history: Safari runs its
    // page-transition animation, peels the Flutter view off the canvas, and
    // leaves it blank until the next repaint. Cancel the gesture at its source —
    // swallow single-finger touches that begin inside a thin edge strip before
    // Safari can start the transition. Multi-finger touches and anything that
    // starts away from the edge are untouched, so in-app scrolling and taps keep
    // working (the app has no horizontal swipe gestures of its own).
    (function () {
      var EDGE_PX = 24;
      document.addEventListener('touchstart', function (e) {
        if (e.touches.length !== 1) return;
        var x = e.touches[0].clientX;
        if (x <= EDGE_PX || x >= window.innerWidth - EDGE_PX) {
          e.preventDefault();
        }
      }, { capture: true, passive: false });
    })();
  </script>
</head>
<body>
  <!-- Branded loading splash, shown until Flutter renders its first frame.
       Markup + styles are inline (no network), so it paints on the first
       browser frame instead of a blank white page. -->
  <div id="lt-splash" role="status" aria-label="Loading live.tips">
    <div class="lt-wordmark">live<span class="lt-dot">.</span>tips</div>
    <div class="lt-spinner"></div>
  </div>

  <script>
    // Remove the splash once Flutter has painted. Flutter web dispatches the
    // `flutter-first-frame` event on `window` right after the first frame is
    // rasterised, which is exactly when the app is visible underneath. Fade,
    // then remove the node from the DOM. Guarded so it only runs once, and
    // backed by a safety timeout in case the event is ever missed.
    (function () {
      var removed = false;
      function hideSplash() {
        if (removed) return;
        removed = true;
        var el = document.getElementById('lt-splash');
        if (!el) return;
        el.classList.add('lt-hide');
        el.addEventListener('transitionend', function () {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        });
        // Fallback removal if transitionend never fires (e.g. reduced motion
        // paths that skip the transition on some engines).
        setTimeout(function () {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }, 500);
      }
      window.addEventListener('flutter-first-frame', hideSplash);
      // Safety net: never trap the user behind the splash if the event is
      // missed. 15s is far past a normal cold boot.
      setTimeout(hideSplash, 15000);
    })();
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
