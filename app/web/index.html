<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Your tip jar for live performances — fans scan a code, you watch the jar fill.">
  <link rel="canonical" href="https://live.tips/app/">

  <!-- social share preview — image lives on the apex site (see website/) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="live.tips">
  <meta property="og:url" content="https://live.tips/app/">
  <meta property="og:title" content="live.tips — live tip jar app">
  <meta property="og:description" content="Your tip jar for live performances — fans scan a code, you watch the jar fill.">
  <meta property="og:image" content="https://live.tips/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://live.tips/og-image.png">

  <!-- iOS meta tags & icons -->
  <!-- Both flags let an "Add to Home Screen" shortcut launch standalone (no
       Safari chrome) — the only way to get a fullscreen stage on iPhone,
       which has no Fullscreen API. -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="live.tips">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>live.tips</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Stop the browser turning a horizontal overscroll into history
       navigation — the two-finger swipe (macOS trackpad) and edge swipe
       (iOS) otherwise fire back/forward mid-session and tear down open
       modals. Flutter drives its own scrolling, so blocking the x-axis
       navigation gesture here has no effect on in-app scrolling. */
    html, body {
      overscroll-behavior-x: none;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
