<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>live.tips stage</title>
<style>
  /* The page paints its own full-bleed background (kStageBlack → theme
     gradient): WebView background transparency is not available on every
     platform, so we never rely on it. The theme vars are set by the library. */
  :root { --bg0: #0d0e12; --bg1: #191b24; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #0d0e12;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background:
      radial-gradient(120% 90% at 50% 12%, var(--bg1) 0%, var(--bg0) 58%, #05060a 100%);
  }
  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; }
</style>
</head>
<body>
<div id="stage"></div>
<script>
  // The stage fills the screen edge to edge inside a same-origin <iframe>, so
  // a swipe from the left/right screen edge lands HERE, not on the host page —
  // its own edge-swipe guard (app/web/index.html) never sees these touches.
  // iOS/iPadOS Safari reads that swipe as history back/forward (touch-action
  // above doesn't cover this system gesture), which tears the stage off the
  // canvas and leaves it blank. The stage is meant to be left only by the Stop
  // button (live) or the on-screen back arrow (preview), so cancel the gesture
  // at its source: swallow single-finger touches that begin in a thin edge
  // strip before Safari can start the transition. Orbit drags start well
  // inside the scene, so they're untouched.
  (function () {
    var EDGE_PX = 24;
    document.addEventListener('touchstart', function (e) {
      if (e.touches.length !== 1) return;
      var x = e.touches[0].clientX;
      if (x <= EDGE_PX || x >= window.innerWidth - EDGE_PX) {
        e.preventDefault();
      }
    }, { capture: true, passive: false });
  })();
</script>
<script src="stage.js"></script>
</body>
</html>
