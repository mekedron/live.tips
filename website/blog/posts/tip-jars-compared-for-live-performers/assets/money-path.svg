<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300" role="img" aria-labelledby="mp-title mp-desc" font-family="Outfit, ui-sans-serif, system-ui, sans-serif">
  <title id="mp-title">Two ways a tip reaches a performer</title>
  <desc id="mp-desc">On a creator platform, a tip travels from the fan to the platform, into a held balance, through a payout queue, and finally to the artist. With live.tips, the tip travels from the fan straight to the artist.</desc>

  <rect width="760" height="300" rx="14" fill="#FAF6F1"/>

  <!-- ── Row 1: the platform path ─────────────────────────────────── -->
  <text x="36" y="46" font-size="15" font-weight="600" fill="#70685D" letter-spacing="1.4">A CREATOR PLATFORM</text>

  <g fill="#FFFFFF" stroke="#E4DAD0">
    <rect x="36"  y="66" width="124" height="60" rx="12"/>
    <rect x="212" y="66" width="124" height="60" rx="12"/>
    <rect x="388" y="66" width="124" height="60" rx="12"/>
    <rect x="564" y="66" width="160" height="60" rx="12"/>
  </g>

  <g font-size="16" font-weight="600" fill="#221D18" text-anchor="middle">
    <text x="98"  y="102">Your fan</text>
    <text x="274" y="94">Platform</text>
    <text x="450" y="94">Held balance</text>
    <text x="644" y="102">You</text>
  </g>
  <g font-size="12.5" fill="#70685D" text-anchor="middle">
    <text x="274" y="112">takes its cut</text>
    <text x="450" y="112">payout queue</text>
  </g>

  <g stroke="#C9BDB1" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <path d="M168 96 H 204"/>
    <path d="M344 96 H 380"/>
    <path d="M520 96 H 556"/>
  </g>
  <text x="450" y="146" font-size="12.5" fill="#8A2E14" text-anchor="middle">days later</text>

  <!-- ── Row 2: live.tips ─────────────────────────────────────────── -->
  <text x="36" y="216" font-size="15" font-weight="600" fill="#8A2E14" letter-spacing="1.4">LIVE.TIPS</text>

  <g stroke="#F0C9BB">
    <rect x="36"  y="236" width="124" height="60" rx="12" fill="#FFFFFF"/>
    <rect x="564" y="236" width="160" height="60" rx="12" fill="#FDE7DF"/>
  </g>

  <g font-size="16" font-weight="600" fill="#221D18" text-anchor="middle">
    <text x="98"  y="272">Your fan</text>
    <text x="644" y="264">You</text>
  </g>
  <text x="644" y="282" font-size="12.5" fill="#8A2E14" text-anchor="middle">on stage, now</text>

  <path d="M168 266 H 556" stroke="#E8542F" stroke-width="2" fill="none" marker-end="url(#arrow-coral)"/>
  <text x="362" y="256" font-size="12.5" fill="#70685D" text-anchor="middle">no balance, no queue, no cut</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3.6" orient="auto">
      <path d="M0 0 L 7.2 3.6 L 0 7.2 z" fill="#C9BDB1"/>
    </marker>
    <marker id="arrow-coral" markerWidth="9" markerHeight="9" refX="7" refY="3.6" orient="auto">
      <path d="M0 0 L 7.2 3.6 L 0 7.2 z" fill="#E8542F"/>
    </marker>
  </defs>
</svg>
