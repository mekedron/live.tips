<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>stage dev harness</title>
<style>
  :root { --bg0: #0d0e12; --bg1: #191b24; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0d0e12; }
  body { background: radial-gradient(120% 90% at 50% 12%, var(--bg1) 0%, var(--bg0) 58%, #05060a 100%); }
  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; }
  /* fake native HUD band + control bar so insets framing is honest */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; height: 90px; z-index: 5;
    display: flex; align-items: center; justify-content: center; gap: 18px;
    color: #ffe9b0; font: 600 15px/1.3 system-ui; pointer-events: none;
    text-shadow: 0 1px 8px rgba(0,0,0,.8);
  }
  #bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 5;
    display: flex; flex-wrap: wrap; gap: 6px; padding: 10px;
    background: rgba(10,11,16,.82); backdrop-filter: blur(6px);
    font: 12px system-ui; color: #cbd0dd; align-items: center;
  }
  button, select, input[type=range] { font: 12px system-ui; }
  button { background: #272b3a; color: #e8ebf4; border: 0; border-radius: 7px; padding: 6px 10px; cursor: pointer; }
  button:hover { background: #333850; }
  #log {
    position: fixed; right: 8px; top: 96px; width: 340px; max-height: 40vh; overflow: auto; z-index: 6;
    font: 10px/1.5 ui-monospace, monospace; color: #9fe8b0;
    background: rgba(4,6,10,.7); border-radius: 8px; padding: 8px; white-space: pre-wrap;
  }
</style>
</head>
<body>
<div id="stage"></div>
<div id="hud">— fake native HUD band (90 px) —</div>
<div id="log"></div>
<div id="bar">
  <select id="renderer">
    <option value="3d" selected>3d</option>
    <option value="2d">2d</option>
  </select>
  <select id="scene">
    <option>abstract</option><option selected>pub</option><option>concert</option>
    <option>street</option><option>metro</option><option>cafe</option>
  </select>
  <select id="vessel">
    <option>caviar</option><option>tin</option><option>mug</option><option>jar05</option>
    <option>jar1</option><option>jar2</option><option selected>stage</option><option>jar3</option>
    <option>jar5</option><option>bucket</option><option>bowl</option>
  </select>
  <select id="theme">
    <option selected>golden-hour</option><option>nord-sky</option><option>forest-signal</option>
    <option>rose-pulse</option><option>cobalt-stage</option><option>graphite-lime</option>
  </select>
  <label><input type="checkbox" id="notes"> notes</label>
  <label><input type="checkbox" id="sound"> sound</label>
  <label><input type="checkbox" id="tipSound"> tip sound</label>
  <button id="boot">boot</button>
  <button id="tip1">tip 1%</button>
  <button id="tip10">tip 10%</button>
  <button id="tipRoll">tip +rollover</button>
  <button id="tipStorm">giant tip (2 rolls)</button>
  <button id="to65">sync 65%</button>
  <button id="to121">sync 121%</button>
  <button id="to199">sync 199%</button>
  <button id="to0">sync 0%</button>
  <button id="pulse">demoPulse</button>
  <button id="pause">pause/resume</button>
  jarPct: <span id="pct">—</span>
</div>
<script>
  // ---- fake host: installs the JS→host channel BEFORE the library loads ----
  const logEl = document.getElementById('log');
  const pctEl = document.getElementById('pct');
  let jarPct = 0, bankedJars = 0, paused = false;
  window.LiveTips = {
    postMessage(s) {
      const m = JSON.parse(s);
      if (m.type !== 'perf') {
        logEl.textContent = `← ${s}\n` + logEl.textContent.slice(0, 4000);
      }
      if (m.type === 'hello') log('hello received — press boot');
    },
  };
  function log(s) { logEl.textContent = `· ${s}\n` + logEl.textContent.slice(0, 4000); }
  function send(m) { window.__stage.dispatch(JSON.stringify({ v: 1, ...m })); }
  function cfg() {
    return {
      vessel: document.getElementById('vessel').value,
      scene: document.getElementById('scene').value,
      theme: document.getElementById('theme').value,
      notes: document.getElementById('notes').checked,
      sound: document.getElementById('sound').checked,
      tipSound: document.getElementById('tipSound').checked,
      quality: 'auto',
      reducedMotion: false,
      insets: { top: 90, bottom: document.getElementById('bar').offsetHeight },
    };
  }
  function show() { pctEl.textContent = jarPct.toFixed(3) + '  🏆' + bankedJars; }
  function tip(deltaPct) {
    let after = jarPct + deltaPct, rollovers = 0;
    while (after >= 2) { rollovers++; after -= 2; bankedJars++; }
    jarPct = after;
    send({ type: 'tip', id: 'dev', deltaPct, jarPctAfter: after, rollovers });
    show();
  }
  document.getElementById('boot').onclick = () => {
    send({ type: 'init', renderer: document.getElementById('renderer').value,
           config: cfg(), state: { jarPct, bankedJars } });
  };
  document.getElementById('tip1').onclick = () => tip(0.01);
  document.getElementById('tip10').onclick = () => tip(0.10);
  document.getElementById('tipRoll').onclick = () => tip(2 - jarPct + 0.07); // exactly one rollover, +7% remainder
  document.getElementById('tipStorm').onclick = () => tip(4 - jarPct + 0.33);
  for (const [id, p] of [['to65', 0.65], ['to121', 1.21], ['to199', 1.99], ['to0', 0]]) {
    document.getElementById(id).onclick = () => {
      jarPct = p; show();
      send({ type: 'syncState', state: { jarPct, bankedJars } });
    };
  }
  document.getElementById('pulse').onclick = () => send({ type: 'demoPulse' });
  document.getElementById('pause').onclick = () => { paused = !paused; send({ type: 'setPaused', paused }); };
  for (const id of ['scene', 'vessel', 'theme']) {
    document.getElementById(id).onchange = (e) => send({ type: 'setConfig', config: { [id]: e.target.value } });
  }
  document.getElementById('notes').onchange = (e) => send({ type: 'setConfig', config: { notes: e.target.checked } });
  document.getElementById('sound').onchange = (e) => send({ type: 'setConfig', config: { sound: e.target.checked } });
  document.getElementById('tipSound').onchange = (e) => send({ type: 'setConfig', config: { tipSound: e.target.checked } });
  show();
</script>
<script src="../app/assets/stage/stage.js"></script>
</body>
</html>
