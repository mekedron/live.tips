name: Feature / change request
description: Something the product should do that it doesn't do yet.
title: "[Feature] "
labels: ["type/feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What can't an artist, a fan, or a venue do today? Describe the situation, not the solution.
      placeholder: An artist who reconnects a different Stripe account has no way to tell that their QR jar is now pointing at a dead payment link.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should happen instead.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which parts of the system this touches — app, functions, rules, website.
      render: text

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1 — high
        - P2 — medium
        - P3 — low
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Blocks / Blocked by
      render: text
