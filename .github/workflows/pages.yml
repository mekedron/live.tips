name: Deploy site (landing + app)

# Publishes the whole site to GitHub Pages as ONE artifact, because Pages keeps
# only a single deployment per repository — a second, independent workflow would
# overwrite this one rather than add a folder alongside it. Everything is
# assembled under _site/ and deployed together, served from the apex custom
# domain live.tips (see the CNAME written below):
#   _site/         landing page, root=English + /xx/ per locale   -> live.tips/
#   _site/stage/   tip-jar stage (app/assets/stage/)              -> live.tips/stage/
#   _site/app/     Flutter web build                              -> live.tips/app/
# The landing pages are rendered from one template + per-language strings by
# scripts/build_site.py (see website/i18n/); there is no per-locale HTML clone.
# The stage is assembled from the committed renderer build in app/assets/stage/,
# so there is a single source of truth for that ~600 KB artifact (rebuilt from
# renderer/src via `npm run build`). The Flutter app is built fresh here.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'scripts/build_site.py'
      - 'app/lib/**'
      - 'app/web/**'
      - 'app/assets/**'
      - 'app/pubspec.yaml'
      - 'app/pubspec.lock'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least privilege the Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin to the version tracked in app/.metadata so CI matches local builds.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      # Pub packages are keyed on the lockfile so unchanged deps restore instantly.
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Build Flutter web
        working-directory: app
        run: |
          flutter pub get
          # Served from the /app/ sub-path of the apex domain (live.tips/app/), so
          # the base href must match the deploy URL or assets and
          # flutter_service_worker.js resolve from the wrong root (white screen).
          flutter build web --release --base-href "/app/"

      - name: Assemble site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          # Bind the apex custom domain on every deploy. GitHub Pages also stores
          # this in the repo's Pages settings, but shipping CNAME in the artifact
          # keeps the workflow deploy from dropping the domain.
          echo "live.tips" > _site/CNAME
          # Landing pages: render root (English) + every /xx/ locale from one
          # template + per-language strings, and copy website/ static assets
          # (fonts, icons, og-image, robots.txt) + emit sitemap.xml.
          python3 scripts/build_site.py --out _site
          # Reuse the committed renderer build — never duplicated in website/.
          mkdir -p _site/stage
          cp app/assets/stage/index.html app/assets/stage/stage.js _site/stage/
          # Flutter web build -> live.tips/app/.
          mkdir -p _site/app
          cp -R app/build/web/. _site/app/
          echo "Assembled site:"
          find _site -maxdepth 2 | sort
          echo "($(find _site -type f | wc -l) files total)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # live.tips is proxied through Cloudflare (orange cloud), which caches the
  # Pages assets at the edge. A GitHub Pages deploy doesn't notify Cloudflare,
  # so without this the edge keeps serving the previous build until the cache
  # TTL expires. Purge everything after a successful deploy so the new build is
  # visible immediately. Needs the CLOUDFLARE_* repo secrets (a zone-scoped
  # Cache Purge token); no GITHUB_TOKEN permissions are required.
  purge-cache:
    needs: deploy
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -uo pipefail
          response="$(curl --silent --show-error --fail-with-body \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')"
          status=$?
          echo "$response"
          if [ $status -ne 0 ] || ! echo "$response" | jq -e '.success == true' >/dev/null; then
            echo "::error::Cloudflare cache purge failed"
            exit 1
          fi
          echo "Cloudflare cache purged for live.tips."
