name: Deploy worker (api.live.tips relay)

# The relay's own pipeline — independent of pages.yml (the site deploy).
# Uses a Workers-scoped API token, distinct from the cache-purge-only
# CLOUDFLARE_API_TOKEN that pages.yml uses.

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: worker
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
