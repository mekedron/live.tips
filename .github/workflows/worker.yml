name: Deploy worker (api.live.tips relay)

# The relay's own pipeline — independent of pages.yml (the site deploy).
# Uses a Workers-scoped API token, distinct from the cache-purge-only
# CLOUDFLARE_API_TOKEN that pages.yml uses.

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      # One retry: vitest-pool-workers occasionally trips over a SQLite WAL
      # race ("isolated storage" -shm assertion) on Linux runners.
      - run: npx vitest run || npx vitest run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      # secrets.* is not allowed in `if:` — mirror it into env for the guard.
      CF_TOKEN_SET: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ env.CF_TOKEN_SET == 'true' }}
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      # Install the lockfile-pinned wrangler 4 — the action's bundled
      # wrangler 3.x cannot read wrangler.jsonc ("Missing entry-point").
      - run: npm ci
        if: ${{ env.CF_TOKEN_SET == 'true' }}
        working-directory: worker
      - uses: cloudflare/wrangler-action@v3
        # Skipped (not failed) until the one-time Cloudflare setup in
        # worker/README.md has provided the secrets.
        if: ${{ env.CF_TOKEN_SET == 'true' }}
        with:
          workingDirectory: worker
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
